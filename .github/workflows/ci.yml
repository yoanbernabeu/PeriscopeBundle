name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        symfony: ['7.4.*', '8.0.*']
        exclude:
          - php: '8.3'
            symfony: '8.0.*'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
          ini-values: error_reporting=-1

      - name: Pin Symfony version
        run: |
          composer config extra.symfony.require "${{ matrix.symfony }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Code style
        run: composer cs

      - name: Static analysis
        run: composer phpstan

      - name: Tests
        run: composer test
